---
hero:
  enable: true
  weight: 5
  template: hero

  ctaButton:
    url: "map/"
  cta2Button:
    url: "participate/"
  de:
    subtitle: Freifunk Berlin ist eine lokale Initiative mit dem Ziel, ein freies WLAN-Netzwerk über Berlin aufzuspannen und freien Netzzugang anzubieten.
    ctaButton:
      text: Freies WLAN finden
    cta2Button:
      text: Freifunker*in werden
  en:
    subtitle: Freifunk Berlin is a local initiative with the aim of setting up a free WiFi network across Berlin and offering free network access.
    ctaButton:
      text: Find free WiFi
    cta2Button:
      text: Become part of Freifunk

video_text:
  enable: true
  weight: 10
  template: video text

  video: freifunk-verbindet
  width: 640px
  height: 360px

  de:
    title: Was ist Freifunk?
    text: >
      Die Vision von Freifunk ist die Verbreitung freier Netzwerke, die
      Demokratisierung der Kommunikationsmedien und die Förderung lokaler
      Sozialstrukturen. Durch die Vernetzung ganzer Stadtteile wollen wir der
      digitalen Spaltung entgegenwirken und freie unabhängige Netzwerkstrukturen
      aufbauen. Konkret hat sich Freifunk zum Ziel gesetzt, offene WLAN-Netze
      einzurichten und diese miteinander zu verbinden. Dies ermöglicht einen
      freien Datenverkehr "durch die Luft" in der ganzen Stadt innerhalb des
      Freifunk-Netzes. Freifunk ist somit eine offene nicht-kommerzielle
      hierarchielose Initiative für freie Funknetzwerke.
  en:
    title: What is Freifunk?
    text: >
      Freifunk stands for distributing free networks, democratizing media of
      communication and promoting local social structures. By interconnecting
      whole neighborhoods, we want to bridge the digital gap and establish a free
      and independent network infrastructure. More precisely, the aim of Freifunk
      is installing open wifi networks and interconnecting them. This facilitates
      free data "air traffic" in the whole city within the Freifunk network. In
      short, Freifunk is an open, non-commercial, non-hierarchical initiative for
      free networks.

calendar:
  enable: true
  weight: 30
  template: calendar

  ical: index.ics

  de:
    title: Termine
    text: >
      Als Community organisieren wir regelmäßig Treffen, bei denen wir uns
      austauschen und gemeinsam daran arbeiten, das Netz zu verbessern. Darüber
      hinaus sind wir auf verschiedenen Veranstaltungen präsent, um unser Projekt
      vorzustellen und wertvolle Kontakte zu knüpfen. Hier findest du die Termine
      für diesen Monat. Eine gesamte Übersicht ist im [Kalender](/de/events/) aufgeführt.
  en:
    title: Events
    text: >
      As a community, we regularly organize meetings where we exchange ideas and
      collaboratively work to improve the network. Furthermore, we are present at
      various events to showcase our project and make valuable connections. Here,
      you can find the dates for the upcoming month, and the complete overview is
      available in the [calendar](/en/events/).

mastodon:
  enable: true
  weight: 20
  template: mastodon

  link: https://chaos.social/api/v1/accounts/108384504829142801/statuses
  de:
    title: Aktivitäten
    text: >
      Wir verbessern das Freifunk-Netz kontinuierlich. Dafür entwickeln wir unsere
      Software, upgraden Hardware oder treffen uns als Community gemeinsam. Um
      Einblicke in unsere Aktivitäten zu geben, posten wir gelegentlich ein Update
      auf Mastodon. Hier ein Auszug aus den letzten Meldungen. Der vollständige
      Feed ist im [Freifunk-Berlin
      Mastodon-Account](https://chaos.social/@freifunk_berlin) zu finden.
  en:
    title: Activities
    text: >
      We are constantly improving the Freifunk network. To do this, we develop our
      software, upgrade our hardware, and come together as a community. To provide
      insights into our activities, we will occasionally post updates. Here’s a
      selection of the latest announcements. The complete feed can be found on the
      [Freifunk-Berlin Mastodon account](https://chaos.social/@freifunk_berlin).

