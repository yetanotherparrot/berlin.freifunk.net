{{ $sectionTitle := .Scratch.Get "sectionTitle" }}
{{ $data := index .Site.Data.landing $sectionTitle }}
{{ $translated := index $data .Site.Language.Lang }}

<div class="container pt-5">
    <h2>FAQ</h2>
    <div class="accordion" id="accordion">
        {{ $i := 0 }}
        {{ range $translated.questions }}
        <div class="accordion-item">
            <h2 class="accordion-header border-bottom border-1 border-secondary">
                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                    data-bs-target="#collapse{{ $i }}" aria-expanded="false" aria-controls="collapse{{ $i }}">
                    {{ .question }}
                </button>
            </h2>
            <div id="collapse{{ $i }}" class="accordion-collapse collapse" data-bs-parent="#accordion">
                <div class="accordion-body">
                    {{ .answer | markdownify }}
                </div>
            </div>
        </div>
        {{ $i = add $i 1 }}
        {{ end }}
    </div>
</div>
